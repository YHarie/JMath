  <script>
    function getRandomInt(min, max, excludeZero = false) {
      let v;
      do {
        v = Math.floor(Math.random() * (max - min + 1)) + min;
      } while (excludeZero && v === 0);
      return v;
    }
//インフラ関数下から。
function insu(a, b, c) {//因数定理を利用した因数分解。3次式
  for (let l = -10; l <= 10; l++) {
    const value = a * l * l + b * l + c;
    if (value === 0) {
      return -l; // 最初に見つけた解を返して終了
    }
  }
  return null; // 該当する値がない場合
}



    function gcd(a, b) {//最大公約数
      return b === 0 ? Math.abs(a) : gcd(b, a % b);
    }
	function lcm(a, b) {//最小公倍数
	  if (a === 0 || b === 0) return 0; // どちらかが0のときは0
	  return Math.abs(a * b) / gcd(a, b);
	}

    function moji(b, variable = "") {//途中の項。プラス，マイナスもつける。
      if (b === 0) return "";
      if (b === 1) return `+${variable}`;
      if (b === -1) return `-${variable}`;
      return `${b > 0 ? "+" : ""}${b}${variable}`;
    }

    function keisu(b, variable = "") {//係数。1，-1のとき省略できるようにする。
      if (b === 0) return "";
      if (b === 1) return `${variable}`;
      if (b === -1) return `-${variable}`;
      return `${b}${variable}`;
    }
  function teisu(b, variable = "") {//定数項
      if (b === 0) return "";
     return `${b > 0 ? "+" : ""}${b}${variable}`;
    }

function kakko(n) {//負の数にカッコをつける
  return n < 0 ? `(${n})` : `${n}`;
}
function kanyaku(n,j) {//ルートの簡約化 j=1の時は文字列，j=2の時は配列で数値を返す。[外，中]
  if (n < 0) return `i√${-n}`; // 負の数は虚数
  if (n === 0) return "0";
  if (n === 1) return "1";

  let outside = 1;
  let inside = n;

  for (let i = 2; i * i <= inside; i++) {
    while (inside % (i * i) === 0) {
      inside /= i * i;
      outside *= i;
    }
  }
if(j===1){
 if (inside === 1) return `${outside}`;
if (outside === 1) return `\\sqrt{${inside}}`;

return `${outside}\\sqrt{${inside}}`;}
if(j===2){
return [outside,inside];

}
}

function bunsu(s, b) {//分数表記してくれる。分母が1のときは自動的に分子だけ返す。yakubunしてから使うといいかも。
[s,b]=yakubun(s,b);
  if (b === 1) { return `${s}`; }
  if (b === -1) { return `${-s}`; }
  return s < 0 ? `-\\frac{${-s}}{${b}}` : `\\frac{${s}}{${b}}`;
}


function yakubun(numerator, denominator) {//約分関数。[a,b]=yakubun(a,b)のように使う。
  if (denominator === 0) {
    throw new Error("分母が0です");
  }

  const divisor = gcd(Math.abs(numerator), Math.abs(denominator));
  numerator = numerator/divisor;
  denominator = denominator/divisor;

  // 分母を正にする
  if (denominator < 0) {
    numerator = -numerator;
    denominator = -denominator;
  }

  return [numerator, denominator];
}
//インフラ関数ここまで
//円の方程式用関数
function tenkai(a,b)//(ax+b)^2の展開したときの係数を返す。
{
return [a*a,2*a*b,b*b];//次数順に係数を返す。

}

function Cmake(a,b,r)//(a,b)を中心とする半径√rの円の一般刑を返す。rの値に注意。
{
return  `x^{2}+y^{2}${moji(-2*a,`x`)}${moji(-2*b,`y`)}${teisu(a*a+b*b-r)}=0`;

}


function distance(a,b,c,x,y){//点と直線の距離
let p,q,m,n,r;
p=Math.abs(a*x+b*y+c);
[m,n]=kanyaku(a*a+b*b,2);//2は数字配列[外，中]
q=m*n;
[p,q]=yakubun(p,q);
r=kanyaku(n,1);//文字列を返す。
let answer= n===1 ? `${bunsu(p,q)}`: q===1 ? `${keisu(p)}${r}`: `\\frac{${keisu(p)}${r}}{${q}}`;
return answer;
}

function generateQuiz() {//問題生成関数
  document.getElementById('feedback').textContent = '';
  document.getElementById('solution').textContent = '';
  let i = parseInt(document.getElementById('modeSelect1').value);

 if ( i === 0) i = getRandomInt(1, 6);//1～4です。
 if(i===5) i = getRandomInt(2, 4);
  let question = '', answer = 0, solution = '';


if(i===1){//単項式×多項式
let a,b,c,d,shiki,char,X;
char=[[`a`,`b`,`c`,``],[`x`,`y`,`z`,``]];
X=char[getRandomInt(0,1)];
do
{a=[getRandomInt(1,3),getRandomInt(-2,2,true),getRandomInt(-6,6,true)];}while(gcd(a[0],gcd(a[1],a[2]))!==1)
b=getRandomInt(2,4,true);
c=[0,0];
do{c[0]=getRandomInt(0,3);
  c[1]=getRandomInt(0,3);
}while(c[0]===c[1])
c= c[0]>c[1] ? [c[1],c[0]]:[c[0],c[1]];

shiki=`${c[0]!==0 ? `${keisu(b*a[0],`${X[0]}${X[c[0]]}${X[c[1]]}`)}`:  `${keisu(b*a[0],`${X[c[0]]}^2${X[c[1]]}`)}`}
${c[0]===1  ?`${moji(b*a[1],`${X[c[0]]}^2${X[c[1]]}`)} `:c[1]===1 ?`${moji(b*a[1],`${X[c[0]]}${X[1]}^2` )}`:
  c[0]===0 ?`${moji(b*a[1],`${X[c[0]]}${X[1]}${X[c[1]]}`)}`: `${moji(b*a[1],`${X[1]}${X[c[0]]}${X[c[1]]}`)}` }
${moji(b*a[2],`${X[c[0]]}${X[c[1]]}`)}`;
answer=`${keisu(b,`${X[c[0]]}${X[c[1]]}`)}(${keisu(a[0],`${X[0]}`)}
${a[0]===0 ? `${keisu(a[1],`${X[1]}`)}`:
`${moji(a[1],`${X[1]}`)}`}
${teisu(a[2])})
`;

  question = `$$ ${shiki}を因数分解せよ。$$`;
  solution=`$$ ${shiki}=${answer} $$`;

}
if(i===2){
  let a,b,c,d,shiki,x,char;
do{
a=getRandomInt(-9,9,true);
b=getRandomInt(-9,9,true);}while(Math.abs(a)===Math.abs(b))
char=[`x`,`y`,`a`,`t`];
x=char[getRandomInt(0,3)];
shiki=`(${x}${teisu(a)})(${x}${teisu(b)})`;
answer=`${x}^2 ${moji(a+b,`${x}`)}${teisu(a*b)}`;
  question = `$$ ${answer}を因数分解せよ。$$
`;

solution=`$$ ${answer}=${shiki} $$
`;
}
if(i===3){
  let a,b,c,d,shiki,char,x;
  char=[`x`,`y`,`a`,`t`];
x=char[getRandomInt(0,3)];
a=getRandomInt(-9,9,true);
b=getRandomInt(2,5,true);
let j=getRandomInt(1,10);
if(j<9){
shiki=`(${x}${teisu(a)})^2`;
answer=`${x}^2${moji(2*a,`${x}`)}${teisu(a**2)}`;
}
if(j===9){
  let p=a/Math.abs(a);
  let q= p===1?`+`:``; 
shiki=`\\left(${x}${q}${bunsu(a,b)}\\right)^2`;
answer=`${x}^2${q}${bunsu(a*2,b)}${x}+${bunsu(a**2,b**2)}
`;
}
if(j===10){
do{b=getRandomInt(2,5);}while(gcd(a,b)>1)
let p=[getRandomInt(0,3),0]
p[1]=(p[0]+1)%4;
x=[char[p[0]],char[p[1]]];
shiki=`(${keisu(b,`${x[0]}`)}${moji(a,`${x[1]}`)})^2`;
answer=`${keisu(b**2,`${x[0]}^2`)}${moji(2*a*b,`${x[0]}${x[1]}`)}${moji(a**2,`${x[1]}^2`)}`;
}
question = `$$ ${answer}を因数分解せよ。$$
`;

solution=`$$ ${answer}=${shiki} $$
`;
}
if(i===4){
  let a,b,c,d,shiki,char,x;
  char=[`x`,`y`,`a`,`t`,``];
x=char[getRandomInt(0,3)];
a=getRandomInt(1,9,true);
b=getRandomInt(2,5,true);
let j=getRandomInt(1,3);
if(j===1){
shiki=`(${x}${teisu(a)})(${x}${teisu(-a)})`;
answer=`${x}^2${teisu(-1*a**2)}`;
}
if(j===2){
  
shiki=`\\left(${x}+${bunsu(a,b)}\\right) \\left(${x}${bunsu(-a,b)}\\right)`;
answer=`${x}^2-${bunsu(a**2,b**2)}
`;
}
if(j===3){
do{b=getRandomInt(2,5);}while(gcd(a,b)>1)
let p=[getRandomInt(0,4),0]
p[1]=(p[0]+1)%5;
x=[char[p[0]],char[p[1]]];
shiki=`(${keisu(b,`${x[0]}`)}${moji(a,`${x[1]}`)}) (${keisu(b,`${x[0]}`)}${moji(-a,`${x[1]}`)}) `;
answer=`${x[0]===``?`${b**2}`:`${keisu(b**2,`${x[0]}^2`)}`}${moji(-1*a**2,`${x[1]}^2`)}`;
}
question = `$$ ${answer}を因数分解せよ。$$
`;

solution=`$$ ${answer}=${shiki} $$
`;
}



if(i===6){//展開の応用
let a,b,c,d,shiki;

if(j===1){

`;

$$=${b}(${x}^2${moji(c[1]/b,`${x}`)}${teisu(c[2]/b)})$$
$$=${shiki} $$`;
}

if(j===2){
  let char,X;
char=[[`a`,`b`,`c`],[`x`,`y`,`z`]];

question = `$$ ${answer}を因数分解せよ。$$`;

$$　${answer}$$
$$=M^2${moji(a[2]*2,`M`)}${teisu(a[2]**2)}$$

$$=\\left\\{(${M})${teisu(a[2]**2)}\\right\\}　　(Mを${M}にもどす)$$
$$=${shiki}$$`;
}
if(j===3){
  let char,X;
char=[[`a`,`b`,`c`],[`x`,`y`,`z`]];
X=char[getRandomInt(0,1)];
a=[1,getRandomInt(-2,2,true),getRandomInt(-6,6,true)];
do{b=getRandomInt(-6,6,true);}while(b===a[2])
shiki=`(${keisu(a[0],`${X[0]}`)} ${moji(a[1],`${X[1]}`)}${teisu(a[2])} ) (${keisu(a[0],`${X[0]}`)} ${moji(a[1],`${X[1]}`)}${teisu(b)} )`;

question = `$$ ${answer}を因数分解せよ$$`;

solution=`$$M=${M}とおくと$$

$$=\\left\\{ (${M})${teisu(a[2])}\\right\\}\\left\\{(${M})${teisu(b)}   \\right\\} 　　(Mを${M}にもどす)$$

if(j===4){
  let char,X;
char=[[`a`,`b`,`c`],[`x`,`y`,`z`]];

<button onclick="clearBoard()"style="padding: 1em 2em; font-size: 1.2rem;">クリア</button>
<button onclick="toggleEraser()"style="padding: 1em 2em; font-size: 1.2rem;">消しゴム切替</button>

<script>
  const canvas = document.getElementById('blackboard');
  const ctx = canvas.getContext('2d');
  let drawing = false;
  let isErasing = false; // 消しゴムモードのフラグ

 function toggleEraser() {
  isErasing = !isErasing;

  const button = document.querySelector('button[onclick="toggleEraser()"]');

  if (isErasing) {
    button.style.backgroundColor = "crimson";
    button.style.color = "white";
    button.textContent = "消しゴム（使用中）";
  } else {
    button.style.backgroundColor = "";
    button.style.color = "";
    button.textContent = "消しゴム切替";
  }
}


  function getStrokeStyle() {
    return isErasing ? "#222" : "white"; // 黒板色 or 白
  }

  function getLineWidth() {
    return isErasing ? 25 : 2; // 消しゴムは太め
  }

  function drawLine(x, y) {
    ctx.lineTo(x, y);
    ctx.strokeStyle = getStrokeStyle();
    ctx.lineWidth = getLineWidth();
    ctx.stroke();
  }

  canvas.addEventListener('mousedown', e => {
    drawing = true;
    ctx.beginPath();
    ctx.moveTo(e.offsetX, e.offsetY);
  });

  canvas.addEventListener('mousemove', e => {
    if (drawing) drawLine(e.offsetX, e.offsetY);
  });

  canvas.addEventListener('mouseup', () => drawing = false);
  canvas.addEventListener('mouseleave', () => drawing = false);

  canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    const rect = canvas.getBoundingClientRect();
    const touch = e.touches[0];
    ctx.beginPath();
    ctx.moveTo(touch.clientX - rect.left, touch.clientY - rect.top);
    drawing = true;
  });

  canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    if (!drawing) return;
    const rect = canvas.getBoundingClientRect();
    const touch = e.touches[0];
    drawLine(touch.clientX - rect.left, touch.clientY - rect.top);
  });

  canvas.addEventListener('touchend', () => drawing = false);

  function clearBoard() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
  }
</script>
