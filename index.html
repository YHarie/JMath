<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>数学問題集</title>
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
    }

    nav {
      background-color: #0077cc;
      padding: 1em;
      position: relative;
      color: white;
    }

    .menu {
      display: flex;
      gap: 2em;
    }

    .menu a {
      color: white;
      text-decoration: none;
      font-weight: bold;
      position: relative;
    }

    .dropdown-content, .sub-dropdown-content {
      display: none;
      position: absolute;
      background-color: #f1f1f1;
      min-width: 200px;
      box-shadow: 0px 8px 16px rgba(0,0,0,0.2);
      z-index: 1;
    }

    .dropdown:hover .dropdown-content {
      display: block;
    }

    .dropdown-content a {
      color: #0077cc;
      padding: 1em;
      display: block;
      text-decoration: none;
    }

    .dropdown-content a:hover {
      background-color: #e0f7fa;
    }

    .sub-dropdown {
      position: relative;
    }

    .sub-dropdown-content {
      top: 0;
      left: 100%;
    }
 .section-title {
      font-weight: bold;
      color: red;
      margin-top: 10px;
      padding: 5px 0;
      border-bottom: 1px solid #ccc;
    }
    .sub-dropdown:hover .sub-dropdown-content {
      display: block;
    }

    .sub-dropdown > a::after {
      content: " ▸";
      font-size: 0.9em;
    }

    #toggleMenu {
      background: #005fa3;
      color: white;
      padding: 0.5em 1em;
      border: none;
      cursor: pointer;
      font-size: 1em;
      margin-bottom: 1em;
    }

    #menuContainer {
      display: block;
    }

    iframe {
      width: 100%;
      height: 100vh;
      border: none;
    }
    @media (orientation: portrait) {
      .container {
        flex-direction: column;
      }

      #left-area, #right-area {
        height: 50vh;
      }


    body {
    font-size: 2em;
  }

   select, button {
    font-size: 1.5em;
  }
}
  </style>
</head>
<body>
  <nav>
    <button id="toggleMenu">メニューを隠す</button>
    <div id="menuContainer">
      <div class="menu">
        <div class="dropdown">
          <a href="#">問題一覧 ▾</a>
          <div class="dropdown-content">
            <div class="sub-dropdown">
              <a href="#">中３</a>
              <div class="sub-dropdown-content">
                 <div class="section-title">1章　式の計算</div>
                <a href="展開（中学）.html" target="content-frame">多項式の計算</a>
                <a href="因数分解（中学）.html" target="content-frame">因数分解</a>
                <div class="section-title">2章　平方根</div>
                <a href="平方根.html" target="content-frame">平方根</a>
                <a href="根号をふくむ式の計算.html" target="content-frame">根号をふくむ式の計算</a>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </nav>

  <main>
  <iframe name="content-frame" src="top.html" id="content-frame"></iframe>
  <script>
    function loadPage(url) {
      document.getElementById("content-frame").src = url;
    }
  </script>
</main>


  <script>
    const toggleBtn = document.getElementById('toggleMenu');
    const menuContainer = document.getElementById('menuContainer');
    let visible = true;

    toggleBtn.addEventListener('click', () => {
      visible = !visible;
      menuContainer.style.display = visible ? 'block' : 'none';
      toggleBtn.textContent = visible ? 'メニューを隠す' : 'メニューを表示';
    });
  </script>
</body>
</html>
