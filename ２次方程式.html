  <script>
    function getRandomInt(min, max, excludeZero = false) {
      let v;
      do {
        v = Math.floor(Math.random() * (max - min + 1)) + min;
      } while (excludeZero && v === 0);
      return v;
    }
//インフラ関数下から。
function insu(a, b, c) {//因数定理を利用した因数分解。3次式
  for (let l = -10; l <= 10; l++) {
    const value = a * l * l + b * l + c;
    if (value === 0) {
      return -l; // 最初に見つけた解を返して終了
    }
  }
  return null; // 該当する値がない場合
}



    function gcd(a, b) {//最大公約数
      return b === 0 ? Math.abs(a) : gcd(b, a % b);
    }
	function lcm(a, b) {//最小公倍数
	  if (a === 0 || b === 0) return 0; // どちらかが0のときは0
	  return Math.abs(a * b) / gcd(a, b);
	}

    function moji(b, variable = "") {//途中の項。プラス，マイナスもつける。
      if (b === 0) return "";
      if (b === 1) return `+${variable}`;
      if (b === -1) return `-${variable}`;
      return `${b > 0 ? "+" : ""}${b}${variable}`;
    }

    function keisu(b, variable = "") {//係数。1，-1のとき省略できるようにする。
      if (b === 0) return "";
      if (b === 1) return `${variable}`;
      if (b === -1) return `-${variable}`;
      return `${b}${variable}`;
    }
  function teisu(b, variable = "") {//定数項
      if (b === 0) return "";
     return `${b > 0 ? "+" : ""}${b}${variable}`;
    }

function kakko(n) {//負の数にカッコをつける
  return n < 0 ? `(${n})` : `${n}`;
}
function kanyaku(n,j) {//ルートの簡約化 j=1の時は文字列，j=2の時は配列で数値を返す。[外，中]
  if (n < 0) return `i√${-n}`; // 負の数は虚数
  if (n === 0) return "0";
  if (n === 1) return "1";

  let outside = 1;
  let inside = n;

  for (let i = 2; i * i <= inside; i++) {
    while (inside % (i * i) === 0) {
      inside /= i * i;
      outside *= i;
    }
  }
if(j===1){
 if (inside === 1) return `${outside}`;
if (outside === 1) return `\\sqrt{${inside}}`;

return `${outside}\\sqrt{${inside}}`;}
if(j===2){
return [outside,inside];

}
}

function bunsu(s, b,c) {//分数表記してくれる。分母が1のときは自動的に分子だけ返す。yakubunしてから使うといいかも。
if(c!==0){return `\\frac{${s}}{${b}}`}
else{
  [s,b]=yakubun(s,b);
  if (b === 1) { return `${s}`; }
  if (b === -1) { return `${-s}`; }
  return s < 0 ? `-\\frac{${-s}}{${b}}` : `\\frac{${s}}{${b}}`;
}
}


function yakubun(numerator, denominator) {//約分関数。[a,b]=yakubun(a,b)のように使う。
  if (denominator === 0) {
    throw new Error("分母が0です");
  }

  const divisor = gcd(Math.abs(numerator), Math.abs(denominator));
  numerator = numerator/divisor;
  denominator = denominator/divisor;

  // 分母を正にする
  if (denominator < 0) {
    numerator = -numerator;
    denominator = -denominator;
  }

  return [numerator, denominator];
}
//インフラ関数ここまで
//円の方程式用関数
function tenkai(a,b)//(ax+b)^2の展開したときの係数を返す。
{
return [a*a,2*a*b,b*b];//次数順に係数を返す。

}

function Cmake(a,b,r)//(a,b)を中心とする半径√rの円の一般刑を返す。rの値に注意。
{
return  `x^{2}+y^{2}${moji(-2*a,`x`)}${moji(-2*b,`y`)}${teisu(a*a+b*b-r)}=0`;

}


function distance(a,b,c,x,y){//点と直線の距離
let p,q,m,n,r;
p=Math.abs(a*x+b*y+c);
[m,n]=kanyaku(a*a+b*b,2);//2は数字配列[外，中]
q=m*n;
[p,q]=yakubun(p,q);
r=kanyaku(n,1);//文字列を返す。
let answer= n===1 ? `${bunsu(p,q)}`: q===1 ? `${keisu(p)}${r}`: `\\frac{${keisu(p)}${r}}{${q}}`;
return answer;
}
function root(r){return `\\sqrt{${r}}`;}
function generateQuiz() {//問題生成関数
  document.getElementById('feedback').textContent = '';
  document.getElementById('solution').textContent = '';
  let i = parseInt(document.getElementById('modeSelect1').value);

 if ( i === 0) i = getRandomInt(1, 4);//1～4です。
  let question = '', answer = 0, solution = '';
  let a,b,c,x1,x2,A,B,shiki;
  x1=getRandomInt(-9,9,true);
  if(i===1){
    let j=getRandomInt(1,5)//1.和と積　2.２乗　3.和と差　4.x=0 5.xの項が右辺
    if(j===1){
      do{x2=getRandomInt(-9,9,true)}while(x1===x2)
      b=-(x1+x2);
      c=x1*x2;
      shiki=`x^2${moji(b,`x`)}${teisu(c)}=0`;
      answer=`x=${x1}，${x2}`;
      solution=`$$ 左辺を因数分解すると$$
      $$ 　　(x${teisu(-x1)})(x${teisu(-x2)})=0$$
      $$　x${teisu(-x1)}=0 　または　x${teisu(-x2)}=0$$
      $$よって，${answer}$$`;
    }
    if(j===2){
      b=-x1*2;c=x1**2;
      shiki=`x^2${moji(b,`x`)}${teisu(c)}=0`;
      answer=`x=${x1}`;
      solution=`$$ 左辺を因数分解すると$$
      $$ 　　(x${teisu(-x1)})^2=0$$
      $$　x${teisu(-x1)}=0 $$
      $$よって，${answer}$$`;
    }
    if(j===3){
      x2=-x1;
      b=-(x1+x2);
      c=x1*x2;
      shiki=`x^2${moji(b,`x`)}${teisu(c)}=0`;
      answer=`x=${x1}，${x2}`;
      solution=`$$ 左辺を因数分解すると$$
      $$ 　　(x${teisu(-x1)})(x${teisu(-x2)})=0$$
      $$　x${teisu(-x1)}=0 　または　x${teisu(-x2)}=0$$
      $$よって，${answer}$$`;
    }
    if(j===4){
      x2=x1;
      x1=0;
      let p=getRandomInt(-3,3,true);
      b=-p*(x1+x2);
      c=p*x1*x2;
      shiki=`${keisu(p,`x^2`)}${moji(b,`x`)}${teisu(c)}=0`;
      answer=`x=${x1}，${x2}`;
      solution=`$$ 左辺を因数分解すると$$
      $$ 　　${keisu(p,`x`)}(x${teisu(-x2)})=0$$
      $$　x=0 　または　x${teisu(-x2)}=0$$
      $$よって，${answer}$$`
    }
    if(j===5){
            do{x2=getRandomInt(-9,9,true)}while(Math.abs(x1)===Math.abs(x2))
      b=-(x1+x2);
      c=x1*x2;

      shiki=`x^2${teisu(c)}=${keisu(-b,`x`)}`;
      answer=`x=${x1}，${x2}`;
      solution=`$$ 右辺の${keisu(-b,`x`)}を移項すると$$
      $$  x^2${moji(b,`x`)}${teisu(c)}=0$$
      $$左辺を因数分解すると$$
      $$ 　　${x2===0 ?`x(x${teisu(-x1)})`:`(x${teisu(-x1)})(x${teisu(-x2)})`}=0$$
      $$　x${teisu(-x1)}=0 　または　x${teisu(-x2)}=0$$
      $$よって，${answer}$$`
    }

    
  }
  if(i===2){
    let j=getRandomInt(4,4);
    if(j===1){
      a=[2,3,5,6,7,10,11];
      c=getRandomInt(0,2);
      b=c===2 ? getRandomInt(2,4) :getRandomInt(1,3);
      x1=[getRandomInt(1,9)**2,a[getRandomInt(0,6)]*b**2,a[getRandomInt(0,6)]*b**2];
      
      shiki= c===0 ?`${keisu(b,`x^2`)}=${x1[c]*b}`:c===1 ?`x^2=${x1[c]}`:`${bunsu(1,b)}x^2=${x1[c]/b}`;
      answer= `x=\\pm ${kanyaku(x1[c],1)}`;
      solution=`$$ ${c===0 && b!==1 ? `両辺を${b}で割ると$$$$ x^2=${x1[c]}　`:c===2 ?`両辺に${b}をかけると$$$$ x^2=${x1[c]}　`:`${shiki}　より`}$$
      $$　xは2乗して${x1[c]}になる数であるから，${x1[c]}の平方根である。$$
      $$よって，${answer}
       $$`;
    }
    if(j===2){
      a=[2,3,5,6,7,10,11];
      c=getRandomInt(0,2);
      b=c===2 ? getRandomInt(2,4) :getRandomInt(1,3);
      x1=[getRandomInt(1,9)**2,a[getRandomInt(0,6)]*b**2,a[getRandomInt(0,6)]*b**2];
      
      shiki= c===0 ?`${keisu(b,`x^2`)}-${x1[c]*b}=0`:c===1 ?`x^2-${x1[c]}=0`:`${bunsu(1,b)}x^2-${x1[c]/b}=0`;
      answer= `x=\\pm ${kanyaku(x1[c],1)}`;
      solution=`$$ ${c===0 && b!==1 ? `両辺を${b}で割って，式を整理すると$$$$ x^2=${x1[c]}　`:c===2 ?`両辺に${b}をかけて，式を整理すると$$$$ x^2=${x1[c]}　`:`式を整理すると$$$$x^2=${x1[c]}`}$$
      $$　xは2乗して${x1[c]}になる数であるから，${x1[c]}の平方根である。$$
      $$よって，${answer}
       $$`;
    }
    if(j===3){
      x2=getRandomInt(2,5);
      a=[2,3,5,6,7,10,11];
      c=getRandomInt(0,1);
      do{b= getRandomInt(1,4) ;}while(gcd(x2,b)>1)
      do{ x1=[getRandomInt(1,9)**2,a[getRandomInt(0,6)]*b**2];}while(gcd(x1[0],x2**2)>1 || gcd(x1[1],x2)>1)
      let r=getRandomInt(0,2)**2*getRandomInt(-1,1,true);
      shiki=`${keisu(x2**2,`x^2`)}${teisu(r)}=${x1[c]+r}`;
      let Q=kanyaku(x1[c],2);
      let A=yakubun(Q[0],x2);
      answer=c===0?bunsu(Q[0],x2,0): A[1]===1 ?` ${keisu(A[0],root(Q[1]))}`:`${bunsu(keisu(A[0],root(Q[1])),A[1])}`;
      solution=` ${r!==0 ? `$$ ${r}を移項すると $$`:`` }
      $$ ${keisu(x2**2,`x^2`)}=${x1[c]} $$
      $$ x^2=${bunsu(x1[c],x2**2,1)}$$
      $$したがって　x=\\pm${root(`${bunsu(x1[c],x2**2,0)}`)} $$
      $$ よって，x=\\pm${answer} $$`;
    }
    if(j===4){
      let k=getRandomInt(0,1);
      x2=getRandomInt(-5,5,true);
      a=[2,3,5,6,7,10,11];
      c=getRandomInt(0,1);
      b=getRandomInt(1,3);
      x1=[getRandomInt(1,9)**2,a[getRandomInt(0,6)]*b**2];
      let M=`x${teisu(-x2)}`;
      shiki= k===0?`(${M})^2=${x1[c]}`:`(${M})^2-${x1[c]}=0`;
      let A=x1[0]===1 ?[1,1]: kanyaku(x1[c],2);
      answer=c===0 ?`x=${x2-A[0]}，${x2 + A[0]}`:`x=${x2}\\pm${kanyaku(x1[c],1)}`;
      solution=`$$ M=${M}とおくと $$
      $$${k===0?``:`M^2-${x1[c]}=0$$$$ ${-x1[c]}を移項して$$$$`}
      M^2=${x1[c]}$$
      $$ M=\\pm${kanyaku(x1[c],1)}$$
      $$Mをもとに戻すと$$
      $$ ${M}=\\pm${kanyaku(x1[c],1)}$$
      $$よって，　　${c===0?`x=${x2}\\pm${A[0]}$$$$すなわち　　${answer}`:answer} $$`;
    }
  }
  if(i===3){
    let j=getRandomInt(1,3);
    if(j===1){
      b=getRandomInt(-4,4)*2+getRandomInt(-1,1,true);
      a=getRandomInt(1,4);
      let p;
      do{c=getRandomInt(-3,5,true);
        p=kanyaku(b**2-4*a*c,2);
      }while(gcd(c ,gcd(a,b) ) >1 || b**2-4*a*c<=1||p[1]===1)
      shiki=`${keisu(a,`x^2`)}${moji(b,`x`)}${teisu(c)}=0`;
      B=kanyaku(b**2-4*a*c,1);
      answer=`x=${bunsu(`${-b}\\pm${B}`,2*a,1)}`;
      solution=`$$ 解の公式より $$
      $$ x=\\frac{-${kakko(b)}  \\pm  ${root(`${kakko(b)}^2 -4\\times ${kakko(a)}\\times ${kakko(c)}`)}} {2\\times${a}} $$
      $$${answer} $$`;
    }
    if(j===2){
      b=getRandomInt(-4,4,true);
      a=getRandomInt(1,3);
      let p;
      do{c=getRandomInt(-3,5,true);
        p=kanyaku(b**2-a*c,2);
      }while(gcd(c ,gcd(a,2*b) ) >1 || b**2-a*c<=1||p[1]===1)
      shiki=`${keisu(a,`x^2`)}${moji(2*b,`x`)}${teisu(c)}=0`;
      B=kanyaku(b**2-a*c,1);
      answer=a===1 ?`x=${-b}\\pm${B}`:`x=${bunsu(`${-b}\\pm${B}`,a,1)}`;
      solution=`$$ 解の公式より $$
      $$ x=\\frac{-${kakko(2*b)}  \\pm  ${root(`${kakko(2*b)}^2 -4\\times ${kakko(a)}\\times ${kakko(c)}`)}} {2\\times${a}} $$
      $$ x=\\frac{${-2*b}  \\pm ${root(4*b**2-4*a*c)}} {${2*a}}$$
      $$ x=\\frac{${-2*b}  \\pm ${kanyaku(4*b**2-4*a*c,1)} } {${2*a}} $$
      $$${answer} 　　(上の式を約分した)$$`;
    }
    if(j===3){
      a=getRandomInt(2,4);
      do{x1=getRandomInt(-4,4,true)}while(gcd(a,x1)>1)
      x2=getRandomInt(-3,3,true);
      b=-(a*x2+x1);
      c=x1*x2;
      shiki=`${keisu(a,`x^2`)}${moji(-(a*x2+x1),`x`)}${teisu(x1*x2)}=0`;
      answer=`x=${bunsu(x1,a,0)}，${x2}`;
      A=x1/a>x2 ?bunsu(x1,a,0):x2;
      B=x1/a<x2 ?bunsu(x1,a,0):x2;
      solution=`$$ 解の公式より $$
      $$ x=\\frac{-${kakko(b)}  \\pm  ${root(`${kakko(b)}^2 -4\\times ${kakko(a)}\\times ${kakko(c)}`)}} {2\\times${a}} $$
      $$ x=\\frac{${-b}  \\pm ${root(b**2-4*a*c)}} {${2*a}}$$
      $$ x=\\frac{${-b}  \\pm ${kanyaku(b**2-4*a*c,1)} } {${2*a}} $$
      $$ x=\\frac{${-b}  + ${kanyaku(b**2-4*a*c,1)} } {${2*a}} から，x=${A}$$
      $$ x=\\frac{${-b}  - ${kanyaku(b**2-4*a*c,1)} } {${2*a}} から，x=${B} $$
      $$ よって，　　${answer}$$`;
    }

  }
  if(i===4){
      x1=[getRandomInt(-5,5,true),0];
      do{x1[1]=getRandomInt(-5,5,true)}while(x1[1]===x1[0])
      x2=[getRandomInt(-5,5,true),0];
      do{x2[1]=getRandomInt(-8,8,true)}while(x2[1]===x2[0])
      b=[-(x1[1]+x2[1]),-(x1[0]+x2[0])];
      c=[x1[1]*x2[1],x1[0]*x2[0]];
      shiki=x1[1]===x2[1]?`(x${teisu(-x2[1])})^2=${keisu(b[0]-b[1],`x` )}${b[0]===b[1]?keisu(c[0]-c[1]):teisu(c[0]-c[1])}  `:
       `(x${teisu(-x1[1])})(x${teisu(-x2[1])})=${keisu(b[0]-b[1],`x` )}${b[0]===b[1]?keisu(c[0]-c[1]):teisu(c[0]-c[1])}  `;
      answer=`x=${x1[0]}，${x2[0]}`;
      solution=`$$ ${shiki} 　の左辺を展開すると$$
      $$ x^2${moji(b[0],`x`)}${teisu(c[0])}=${keisu(b[0]-b[1],`x` )}${b[0]===b[1]?keisu(c[0]-c[1]):teisu(c[0]-c[1])}$$
      $$${keisu(b[0]-b[1],`x` )}${b[0]===b[1]?keisu(c[0]-c[1]):teisu(c[0]-c[1])}を左辺に移項して$$
      $$ x^2${moji(b[1],`x`)}${teisu(c[1])}=0 $$
      $$ 左辺を因数分解すると$$
      $$ (x${teisu(-x1[0])})(x${teisu(-x2[0])})=0$$
      $$ よって，　　${answer} $$`;
    }
  question=`$$ 方程式${shiki}　を解きなさい。 $$`;
    document.getElementById('question').innerHTML = question;
      window.correctAnswer = answer;

    }

   function showSolution() {

<script>
  const canvas = document.getElementById('blackboard');
  const ctx = canvas.getContext('2d');
  let drawing = false;
  let isErasing = false; // 消しゴムモードのフラグ

 function toggleEraser() {
  isErasing = !isErasing;

  const button = document.querySelector('button[onclick="toggleEraser()"]');

  if (isErasing) {
    button.style.backgroundColor = "crimson";
    button.style.color = "white";
    button.textContent = "消しゴム（使用中）";
  } else {
    button.style.backgroundColor = "";
    button.style.color = "";
    button.textContent = "消しゴム切替";
  }
}


  function getStrokeStyle() {
    return isErasing ? "#222" : "white"; // 黒板色 or 白
  }

  function getLineWidth() {
    return isErasing ? 25 : 2; // 消しゴムは太め
  }

  function drawLine(x, y) {
    ctx.lineTo(x, y);
    ctx.strokeStyle = getStrokeStyle();
    ctx.lineWidth = getLineWidth();
    ctx.stroke();
  }

  canvas.addEventListener('mousedown', e => {
    drawing = true;
    ctx.beginPath();
    ctx.moveTo(e.offsetX, e.offsetY);
  });

  canvas.addEventListener('mousemove', e => {
    if (drawing) drawLine(e.offsetX, e.offsetY);
  });

  canvas.addEventListener('mouseup', () => drawing = false);
  canvas.addEventListener('mouseleave', () => drawing = false);

  canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    const rect = canvas.getBoundingClientRect();
    const touch = e.touches[0];
    ctx.beginPath();
    ctx.moveTo(touch.clientX - rect.left, touch.clientY - rect.top);
    drawing = true;
  });

  canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    if (!drawing) return;
    const rect = canvas.getBoundingClientRect();
    const touch = e.touches[0];
    drawLine(touch.clientX - rect.left, touch.clientY - rect.top);
  });

  canvas.addEventListener('touchend', () => drawing = false);

  function clearBoard() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
  }
</script>

</body>
</html>
