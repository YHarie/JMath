  <script>
    function getRandomInt(min, max, excludeZero = false) {
      let v;
      do {
        v = Math.floor(Math.random() * (max - min + 1)) + min;
      } while (excludeZero && v === 0);
      return v;
    }
//インフラ関数下から。
function insu(a, b, c) {//因数定理を利用した因数分解。3次式
  for (let l = -10; l <= 10; l++) {
    const value = a * l * l + b * l + c;
    if (value === 0) {
      return -l; // 最初に見つけた解を返して終了
    }
  }
  return null; // 該当する値がない場合
}



    function gcd(a, b) {//最大公約数
      return b === 0 ? Math.abs(a) : gcd(b, a % b);
    }
	function lcm(a, b) {//最小公倍数
	  if (a === 0 || b === 0) return 0; // どちらかが0のときは0
	  return Math.abs(a * b) / gcd(a, b);
	}

    function moji(b, variable = "") {//途中の項。プラス，マイナスもつける。
      if (b === 0) return "";
      if (b === 1) return `+${variable}`;
      if (b === -1) return `-${variable}`;
      return `${b > 0 ? "+" : ""}${b}${variable}`;
    }

    function keisu(b, variable = "") {//係数。1，-1のとき省略できるようにする。
      if (b === 0) return "";
      if (b === 1) return `${variable}`;
      if (b === -1) return `-${variable}`;
      return `${b}${variable}`;
    }
  function teisu(b, variable = "") {//定数項
      if (b === 0) return "";
     return `${b > 0 ? "+" : ""}${b}${variable}`;
    }

function kakko(n) {//負の数にカッコをつける
  return n < 0 ? `(${n})` : `${n}`;
}
function kanyaku(n,j) {//ルートの簡約化 j=1の時は文字列，j=2の時は配列で数値を返す。[外，中]
  if (n < 0) return `i√${-n}`; // 負の数は虚数
  if (n === 0) return "0";
  if (n === 1) return "1";

  let outside = 1;
  let inside = n;

  for (let i = 2; i * i <= inside; i++) {
    while (inside % (i * i) === 0) {
      inside /= i * i;
      outside *= i;
    }
  }
if(j===1){
 if (inside === 1) return `${outside}`;
if (outside === 1) return `\\sqrt{${inside}}`;

return `${outside}\\sqrt{${inside}}`;}
if(j===2){
return [outside,inside];

}
}

function bunsu(s, b) {//分数表記してくれる。分母が1のときは自動的に分子だけ返す。yakubunしてから使うといいかも。
[s,b]=yakubun(s,b);
  if (b === 1) { return `${s}`; }
  if (b === -1) { return `${-s}`; }
  return s < 0 ? `-\\frac{${-s}}{${b}}` : `\\frac{${s}}{${b}}`;
}


function yakubun(numerator, denominator) {//約分関数。[a,b]=yakubun(a,b)のように使う。
  if (denominator === 0) {
    throw new Error("分母が0です");
  }

  const divisor = gcd(Math.abs(numerator), Math.abs(denominator));
  numerator = numerator/divisor;
  denominator = denominator/divisor;

  // 分母を正にする
  if (denominator < 0) {
    numerator = -numerator;
    denominator = -denominator;
  }

  return [numerator, denominator];
}
//インフラ関数ここまで
//円の方程式用関数
function tenkai(a,b)//(ax+b)^2の展開したときの係数を返す。
{
return [a*a,2*a*b,b*b];//次数順に係数を返す。

}

function Cmake(a,b,r)//(a,b)を中心とする半径√rの円の一般刑を返す。rの値に注意。
{
return  `x^{2}+y^{2}${moji(-2*a,`x`)}${moji(-2*b,`y`)}${teisu(a*a+b*b-r)}=0`;

}


function distance(a,b,c,x,y){//点と直線の距離
let p,q,m,n,r;
p=Math.abs(a*x+b*y+c);
[m,n]=kanyaku(a*a+b*b,2);//2は数字配列[外，中]
q=m*n;
[p,q]=yakubun(p,q);
r=kanyaku(n,1);//文字列を返す。
let answer= n===1 ? `${bunsu(p,q)}`: q===1 ? `${keisu(p)}${r}`: `\\frac{${keisu(p)}${r}}{${q}}`;
return answer;
}

function generateQuiz() {//問題生成関数
  document.getElementById('feedback').textContent = '';
  document.getElementById('solution').textContent = '';
  let i = parseInt(document.getElementById('modeSelect1').value);

 if ( i === 0) i = getRandomInt(1, 5);//1～4です。
  let question = '', answer = 0, solution = '';
function root(a){
  return `\\sqrt{${a}}`;
}

if(i===1){//単項式×多項式
let a,b,c,d,shiki;
let j=getRandomInt(1,3);
if(j===1){
  a=getRandomInt(1,15);
  shiki=a**2;
  answer=`\\pm${a}`
}
if(j===2){
  let a=[getRandomInt(1,5),getRandomInt(4,11)];
  b=bunsu(a[0],a[1]);
  shiki=bunsu(a[0]**2,a[1]**2);
  answer=`\\pm${b}`;
}
if(j===3){
  a=[2,3,5,6,7,10,11,13,15,17,19,20,21,22,23,26,29,30,31,33,34,35,37,38,39,41,42,43,46,47,51];
  shiki=a[getRandomInt(0,30)];
  answer=`\\pm${kanyaku(shiki,1)}`;
}

  question = `$$ ${shiki}の平方根を求めよ。$$`;
  solution=`$$ ${shiki}の平方根は${answer} $$`;

}
if(i===2){
  let shiki,a,b,pm;
  pm=[getRandomInt(-1,1,true),getRandomInt(-1,1,true)];
  a=[2,3,5,6,7,11,13,14,15];
  b=a[getRandomInt(0,8)];
  shiki=`${keisu(pm[0])} \\left( ${keisu(pm[1])}${kanyaku(b,1)} \\right)^2 `;
  question=`$$ ${shiki} の値を求めなさい。$$`;
  answer=pm[0]*b;
  solution=`$$ ${shiki}=${answer} $$`;
}

if(i===3){
  let a,b,c,d,pm,shiki,j;
j=getRandomInt(1,4);
pm=getRandomInt(-1,1);

if(j===1){
  a=getRandomInt(1,15);
  b=a**2;
  shiki=`${keisu(pm,``)}${root(b)}`;
  answer=`${keisu(pm)}${kanyaku(b)}`;
  solution=`$$ ${shiki}=${keisu(pm,``)}${root(`${a}^2`)}=${keisu(pm,``)}${kanyaku(b,1)}$$`;
}
if(j===2){
  do{
  a=[getRandomInt(1,7),getRandomInt(4,13)];}while(gcd(a[0],a[1] )===a[0] )
  b=[a[0]**2,a[1]**2];
  shiki=`${keisu(pm)}${root(bunsu(b[0],b[1]))}`;
  answer=`${keisu(pm)}${bunsu(a[0],a[1])}`;
  solution=`$$ ${shiki}=${keisu(pm,``)}${root(`\\left( ${bunsu(a[0],a[1])} \\right)^2 `)}=${answer}$$`;
}
if(j===3){
  a=getRandomInt(1,15);
  b=a**2/100;
  a=a/10;
  shiki=`${keisu(pm)}${root(b)}`;
  answer=`${keisu(pm)}${a}`;
  solution=`$$ ${shiki}=${keisu(pm)}${root(`(${a})^2`)}=${answer} $$`;
}
if(j===4){
  a=getRandomInt(5,19);
  b=kakko(-a);
  shiki=`${keisu(pm)}${root(`${b}^2`)}`;
  answer=pm*a;
  solution=`$$ ${shiki}=${keisu(pm)}${root(`${a}^2`)}=${answer} $$`;

}
question=`$$ ${shiki}を根号を使わず表しなさい。$$`;

}
if(i===4){
  let a,b,c,shiki,pm;
  let j=getRandomInt(2,2);
  pm=getRandomInt(-1,1,true);
  if(j===1){
    a=[2,3,5,6,7,10,11,13,15,17,19,20,21,22,23,26,29,30,31,33,34,35,37,38,39,41,42,43,46,47,51];
    b=[a[getRandomInt(2,30)],0];
    b[1]=Math.round(Math.sqrt(b[0]));
    shiki=[`${keisu(pm)}${b[1]}`,`${keisu(pm)}${kanyaku(b[0],1)}`];
    c=[b[1]**2,b[0]]
    }
  if(j===2){
    a=[1,2,3,5,6,7,8,11,12,14,16,18,21,24,27];
    b=[0,a[getRandomInt(0,14)]];
    b[0]=Math.round(Math.abs((b[1]+getRandomInt(-5,2))*10));
    shiki=[`${keisu(pm)}${b[0]/100}`,`${keisu(pm)}${root(b[1]/10)}`];
    c=[b[0]**2/10000,b[1]/10];
  }
  answer= pm*c[0]>pm*c[1] ? `\\gt`:`\\lt`;
  question=`$$ ${shiki[0]}と${shiki[1]}の大小を不等号を用いて表しなさい。 $$`;
  solution=`$$ ${shiki[0]}=${keisu(pm,root(c[0]))}で$$
  $$ ${pm*c[0]}${answer}${pm*c[1]}であるから$$
  $$ ${keisu(pm,root(c[0]))}${answer}${keisu(pm,root(c[1]))}$$
  $$よって　　　${shiki[0]}${answer}${shiki[1]} $$`;
}
if(i===5){
  let a,b,c,q,pm,shiki;
  pm=keisu(getRandomInt(-1,1,true));
  do{a=[getRandomInt(1,6),getRandomInt(4,11)]}while(a[0]===a[1])
  do{b=getRandomInt(2,5)**2+getRandomInt(-2,3,true);}while(gcd(b,a[0])>1)
  q=[root(a[0]**2),root(bunsu(a[0]**2,a[1]**2)),bunsu(a[0],a[1]),root(b),root(bunsu(a[0],b)),`\\pi`,a[0],bunsu(a[0],a[1])];
  c=getRandomInt(0,99)%6;
  shiki=`${pm}${q[c]}`;
  question=`$$ ${shiki}は有理数か無理数かを答えなさい。 $$`;
  answer=c<3 ?`有理数`:`無理数`;
  
  solution=`$$ ${c<2 ?`${shiki}=${pm}${q[c+6]}より，`:``} ${shiki}は${answer}である。$$`;

}

    document.getElementById('question').innerHTML = question;
      window.correctAnswer = answer;
      window.solutionText = solution;
      MathJax.typeset();
    }

    function checkAnswer() {
      const user = parseFloat(document.getElementById('userInput').value);
      const correct = window.correctAnswer;
      const feedback = document.getElementById('feedback');
      feedback.textContent = (user === correct) ? '正解！' : `不正解。正解は ${correct} です。`;
    }

   function showSolution() {
  if (!window.solutionText) {
    document.getElementById('solution').innerHTML = 'まだ問題が生成されていません。';
    return;
  }
  document.getElementById('solution').innerHTML = window.solutionText;
  MathJax.typeset();
}

    window.onload = function () {
      generateQuiz();
      resizeCanvas();
    };

    function resizeCanvas() {
      const canvas = document.getElementById('blackboard');
      const rect = canvas.getBoundingClientRect();
      canvas.width = rect.width;
      canvas.height = rect.height;
    }

    window.addEventListener('resize', resizeCanvas);
  </script>

<body>
  <div class="container">
    <div id="left-area">
      <h1>平方根</h1>
      <label >モード:
        <select id="modeSelect1" onchange="generateQuiz()">
          <option value="1" selected>1.　平方根</option>
          <option value="2">2.　根号の２乗</option>
          <option value="3">3.　根号を使わずに表す</option>
          <option value="4">4.　平方根の大小</option>
          <option value="5">5.　有理数と無理数</option>
          <option value="0">　ランダム出題</option>
        </select>

        </label>
      <div id="question" class="question"></div>
       <div>
        <button onclick="showSolution()"style="padding: 1em 2em; font-size: 1.2rem;">解説</button>
        <button onclick="generateQuiz()"style="padding: 1em 2em; font-size: 1.2rem;">再出題</button>
      </div>
      <div id="feedback" class="feedback"></div>
      <div id="solution" class="solution"></div>
    </div>
   <div id="right-area">
      <p>ここにメモを書いたり、図形を描いたりできます。</p>
      <canvas id="blackboard" width="700"height="700"></canvas>
<button onclick="clearBoard()"style="padding: 1em 2em; font-size: 1.2rem;">クリア</button>
<button onclick="toggleEraser()"style="padding: 1em 2em; font-size: 1.2rem;">消しゴム切替</button>
      
    </div>
  </div>

<script>
  const canvas = document.getElementById('blackboard');
  const ctx = canvas.getContext('2d');
  let drawing = false;
  let isErasing = false; // 消しゴムモードのフラグ

 function toggleEraser() {
  isErasing = !isErasing;

  const button = document.querySelector('button[onclick="toggleEraser()"]');

  if (isErasing) {
    button.style.backgroundColor = "crimson";
    button.style.color = "white";
    button.textContent = "消しゴム（使用中）";
  } else {
    button.style.backgroundColor = "";
    button.style.color = "";
    button.textContent = "消しゴム切替";
  }
}


  function getStrokeStyle() {
    return isErasing ? "#222" : "white"; // 黒板色 or 白
  }

  function getLineWidth() {
    return isErasing ? 25 : 2; // 消しゴムは太め
  }

  function drawLine(x, y) {
    ctx.lineTo(x, y);
    ctx.strokeStyle = getStrokeStyle();
    ctx.lineWidth = getLineWidth();
    ctx.stroke();
  }

  canvas.addEventListener('mousedown', e => {
    drawing = true;
    ctx.beginPath();
    ctx.moveTo(e.offsetX, e.offsetY);
  });

  canvas.addEventListener('mousemove', e => {
    if (drawing) drawLine(e.offsetX, e.offsetY);
  });

  canvas.addEventListener('mouseup', () => drawing = false);
  canvas.addEventListener('mouseleave', () => drawing = false);

  canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    const rect = canvas.getBoundingClientRect();
    const touch = e.touches[0];
    ctx.beginPath();
    ctx.moveTo(touch.clientX - rect.left, touch.clientY - rect.top);
    drawing = true;
  });

  canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    if (!drawing) return;
    const rect = canvas.getBoundingClientRect();
    const touch = e.touches[0];
    drawLine(touch.clientX - rect.left, touch.clientY - rect.top);
  });

  canvas.addEventListener('touchend', () => drawing = false);

  function clearBoard() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
  }
</script>

</body>
